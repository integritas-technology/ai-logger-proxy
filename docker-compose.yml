services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_logger_proxy}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_logger_proxy}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai-proxy:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-3333}:3333"
    environment:
      PORT: 3333
      UPSTREAM_PROVIDER: ${UPSTREAM_PROVIDER:-openai}
      UPSTREAM_BASE_URL: ${UPSTREAM_BASE_URL:-https://api.openai.com}
      UPSTREAM_API_KEY: ${UPSTREAM_API_KEY:-}
      ANTHROPIC_VERSION: ${ANTHROPIC_VERSION:-2023-06-01}
      UPSTREAM_DEFAULT_MODEL: ${UPSTREAM_DEFAULT_MODEL:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/ai_logger_proxy}

volumes:
  postgres-data:
